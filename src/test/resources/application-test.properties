server.servlet.context-path=/api
spring.datasource.url=jdbc:h2:mem:test
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=
spring.datasource.password=
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.globally_quoted_identifiers_skip_column_definitions=true
spring.jpa.properties.hibernate.check_nullability=true
spring.cloud.azure.keyvault.secret.property-source-enabled=true
spring.cloud.azure.keyvault.secret.property-sources[0].endpoint=https://inventory-pro.vault.azure.net
spring.cloud.azure.keyvault.secret.endpoint=https://inventory-pro.vault.azure.net
security.jwt.secret-key=${jwt-key-test}
security.jwt.expiration-time=3600000